<!DOCTYPE html>
<html lang="pt-BR">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>E-Shoes</title>
  <link rel="stylesheet" href="css/reset.css">
  <link rel="stylesheet" href="css/variable.css">
  <link rel="stylesheet" href="css/base.css">
  <link rel="stylesheet" href="css/layout.css">
</head>

<body>
  <header class="site-header" role="banner">
    <div class="container header-inner">
      <div class="logo" aria-label="E-Shoes logo"><!-- placeholder: logo --></div>
      <nav class="main-nav" aria-label="Navegação principal"><!-- placeholder: navegação --></nav>
    </div>
  </header>

  <main>
    <section class="hero" aria-label="Seção hero">
      <!-- estrutura macro da seção hero -->
    </section>

    <section class="categorias" aria-label="Categoria de tênis">
      <!-- estrutura macro da seção de categoria de tênis -->
    </section>

    <section class="produtos-destaque" aria-label="Produtos em destaque">
      <div class="container">
        <div class="grid-produtos"><!-- estrutura macro do grid de produtos --></div>
      </div>
    </section>
  </main>

  <footer class="site-footer" role="contentinfo">
    <div class="container footer-inner">
      <div class="contato"><!-- placeholder: informação de contato --></div>
      <div class="links"><!-- placeholder: links úteis --></div>
    </div>
  </footer>
</body>

</html>
