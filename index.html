<!DOCTYPE html>
<html lang="pt-BR">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>E-Shoes</title>
  <link rel="stylesheet" href="css/reset.css">
  <link rel="stylesheet" href="css/variable.css">
  <link rel="stylesheet" href="css/base.css">
  <link rel="stylesheet" href="css/layout.css">
  <link rel="stylesheet" href="css/components/header.css">
</head>

<body>
  <header class="site-header" role="banner">
    <h1 class="logo">
      <a href="index.html" title="E-Shoes - Página Inicial">
        <img src="./images/logo/logo.svg" alt="Logo da E-Shoes">
      </a>
    </h1>
    <nav class="site-nav" role="navigation" aria-label="Menu de navegação principal">
      <ul>
        <li><a href="#">Masculino</a></li>
        <li><a href="#">Feminino</a></li>
        <li><a href="#">Infantil</a></li>
      </ul>
    </nav>
    <nav class="user-nav" aria-label="Menu de navegação do usuário">
      <ul>
        <li><a href="#">Nossas Lojas</a></li>
        <li><a href="#">Sobre Nós</a></li>
        <li><a href="#"><img src="./images/icons/user.svg" alt="Usuário"></a></li>
        <li><a href="#"><img src="./images/icons/bag.svg" alt="Carrinho"></a></li>

      </ul>
    </nav>

  </header>

  <main>
    <section class="hero" aria-label="Seção hero">
     <span>Krypton one</span>
     <h2 class="hero-title">Transforme qualquer passo em presença</h2>
    </section>

    <section class="categorias" aria-label="Categoria de tênis">
      <!-- estrutura macro da seção de categoria de tênis -->
    </section>

    <section class="produtos-destaque" aria-label="Produtos em destaque">
      <div class="container">
        <div class="grid-produtos"><!-- estrutura macro do grid de produtos --></div>
      </div>
    </section>
  </main>

  <footer class="site-footer" role="contentinfo">
    <div class="container footer-inner">
      <div class="contato"><!-- placeholder: informação de contato --></div>
      <div class="links"><!-- placeholder: links úteis --></div>
    </div>
  </footer>
</body>

</html>
